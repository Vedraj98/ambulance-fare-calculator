<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Ambulance Fare Calculator | Premium Cost Estimator</title>
  <meta name="description" content="Calculate emergency ambulance transport fares instantly. Transparent billing with ₹1200 base fare for the first 6 km and ₹50 per kilometer thereafter.">
  
  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@500;600;700&family=Plus+Jakarta+Sans:wght@500;600;700;800&display=swap" rel="stylesheet">
  
  <!-- CSS Stylesheet -->
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="app-wrapper">
    <main>
      <div class="container">
        <!-- Header Section -->
        <header class="header">
          <div class="header__icon" aria-hidden="true">
            <!-- Medical Cross SVG icon -->
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="currentColor">
              <path d="M19 10.5h-5.5V5c0-.83-.67-1.5-1.5-1.5s-1.5.67-1.5 1.5v5.5H5c-.83 0-1.5.67-1.5 1.5s.67 1.5 1.5 1.5h5.5V19c0 .83.67 1.5 1.5 1.5s1.5-.67 1.5-1.5v-5.5H19c.83 0 1.5-.67 1.5-1.5s-.67-1.5-1.5-1.5z"/>
            </svg>
          </div>
          <h1 class="header__title">Ambulance Fare Calculator</h1>
          <p class="header__subtitle">Quick, transparent emergency transport cost estimation</p>
        </header>

        <!-- Calculator Card -->
        <div class="card">
          <!-- Input fields -->
          <div class="input-section">
            <label for="distance-input" class="input-label">Distance to Destination</label>
            <div class="input-group">
              <div class="input-group__icon">
                <!-- Location/Distance pin SVG -->
                <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                  <path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"></path>
                  <circle cx="12" cy="10" r="3"></circle>
                </svg>
              </div>
              <input type="number" id="distance-input" class="input-field" placeholder="e.g. 15.5" min="0" step="any" required>
              <span class="input-suffix">KM</span>
            </div>
            
            <!-- Error message box -->
            <div id="error-message" class="error-message">
              <!-- Warning/Error icon -->
              <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24">
                <path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm1 15h-2v-2h2v2zm0-4h-2V7h2v6z"/>
              </svg>
              <span id="error-text"></span>
            </div>
          </div>

          <!-- Buttons -->
          <div class="btn-row">
            <button id="btn-calculate" class="btn btn--primary">
              <!-- Calculation/Calculator SVG icon -->
              <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="currentColor">
                <path d="M19 3H5c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h14c1.1 0 2-.9 2-2V5c0-1.1-.9-2-2-2zm-2 10H7v-2h10v2zm0-4H7V7h10v2zm0 8H7v-2h10v2z"/>
              </svg>
              Calculate Fare
            </button>
            <button id="btn-reset" class="btn btn--secondary">
              <!-- Reset SVG icon -->
              <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M21.5 2v6h-6M21.34 15.57a10 10 0 1 1-.57-8.38l5.67-5.67"/>
              </svg>
              Reset
            </button>
          </div>

          <!-- Results Section (hidden by default) -->
          <div id="results" class="results">
            <div class="results__divider"></div>
            <h2 class="results__title">Fare Breakdown</h2>
            
            <div class="result-row">
              <span class="result-row__label">
                <span class="dot dot--cyan"></span> Distance Entered
              </span>
              <span id="out-distance" class="result-row__value">-</span>
            </div>
            
            <div class="result-row">
              <span class="result-row__label">
                <span class="dot dot--yellow"></span> Base Fare (First 6 km)
              </span>
              <span id="out-base-fare" class="result-row__value">-</span>
            </div>
            
            <div class="result-row">
              <span class="result-row__label">
                <span class="dot dot--green"></span> Extra Distance
              </span>
              <span id="out-extra-km" class="result-row__value">-</span>
            </div>
            
            <div class="result-row">
              <span class="result-row__label">
                <span class="dot dot--red"></span> Extra Distance Charges (₹50 / km)
              </span>
              <span id="out-extra-charge" class="result-row__value">-</span>
            </div>
            
            <div class="total-card">
              <span class="total-card__label">Estimated Total Fare</span>
              <span id="out-total-fare" class="total-card__value">-</span>
            </div>
          </div>
        </div>

        <!-- Built for Digital Heroes Action Button -->
        <div class="hero-btn-wrapper">
          <a href="https://digitalheroesco.com" target="_blank" rel="noopener noreferrer" class="hero-btn">
            <!-- Rocket/Hero badge icon -->
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5"/>
            </svg>
            Built for Digital Heroes
          </a>
        </div>
      </div>
    </main>

    <!-- Footer Area -->
    <footer class="footer">
      <div class="footer__name">Vedraj Singh</div>
      <div class="footer__email">
        Email: <a href="mailto:vedrajsingh.work@gmail.com">vedrajsingh.work@gmail.com</a>
      </div>
    </footer>
  </div>

  <!-- JavaScript Behavior -->
  <script src="script.js"></script>
</body>
</html>
